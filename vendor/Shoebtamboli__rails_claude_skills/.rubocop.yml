AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'spec/fixtures/**/*'

# Gem specific configuration
Gemspec/RequireMFA:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

# Style preferences
Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Layout preferences
Layout/LineLength:
  Max: 150

# Metrics
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'lib/generators/**/*'
    - '*.gemspec'

Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'lib/generators/**/*'

Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'lib/generators/**/*'

Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'lib/generators/**/*'
